<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paperclip" />
    <title>Paperclip</title>
    <!-- PAPERCLIP_FAVICON_START -->
<link rel="icon" href="/favicon.ico" sizes="48x48" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- PAPERCLIP_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "paperclip.theme";
        const darkThemeColor = "#18181b";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-BHP9dico.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BfNaDZnn.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Patch: reverse comment order (newest first)
      (() => {
        function reverseComments() {
          // Find comment lists: .space-y-4 > .space-y-3 containing comment cards (.border.p-3)
          document.querySelectorAll('.space-y-4 > .space-y-3').forEach(list => {
            const cards = list.querySelectorAll(':scope > .border');
            if (cards.length < 2 || list.dataset.reversed) return;
            list.dataset.reversed = '1';
            // Reverse DOM order
            const frag = document.createDocumentFragment();
            const children = Array.from(list.children);
            for (let i = children.length - 1; i >= 0; i--) {
              frag.appendChild(children[i]);
            }
            list.appendChild(frag);
          });
        }
        // Run on mutations and periodically (React re-renders can reset)
        new MutationObserver(() => {
          requestAnimationFrame(reverseComments);
        }).observe(document.body, { childList: true, subtree: true });
        // Also poll every 2s in case React re-renders silently
        setInterval(reverseComments, 2000);
      })();
    </script>
  </body>
</html>
